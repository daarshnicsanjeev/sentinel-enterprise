version: "3.9"

# Production compose — no local Ollama service.
# Backend calls Ollama Cloud via OLLAMA_BASE_URL in .env.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - sentinel_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  sentinel_data:
