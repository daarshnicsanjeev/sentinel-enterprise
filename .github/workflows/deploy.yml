# =============================================================================
# Project Sentinel — CI/CD Pipeline
#
# Triggers on every push to main:
#   1. Run backend tests (pytest) — all LLM calls mocked, no Ollama needed
#   2. Run frontend tests (vitest)
#   3. Build React app (vite build)
#   4. rsync backend/ to EC2 + restart sentinel.service + cloudflared-tunnel
#   5. Extract live Cloudflare tunnel URL → update Vercel env var
#   6. Deploy frontend to Vercel (HTTPS CDN) with correct backend URL baked in
#
# Deploy order is intentional: backend first → extract tunnel URL → Vercel build.
# This ensures VITE_API_BASE_URL is always the live tunnel URL, not a stale one.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EC2_HOST                  fallback public IP (updated by infra.yml)
#   EC2_SSH_KEY               full contents of the .pem file
#   EC2_USER                  ubuntu
#   VERCEL_TOKEN              from vercel.com → Settings → Tokens
#   VERCEL_ORG_ID             from vercel.json or `vercel link`
#   VERCEL_PROJECT_ID         from vercel.json or `vercel link`
#   VITE_API_BASE_URL         auto-updated each deploy from live tunnel URL
#   AWS_ACCESS_KEY_ID         for dynamic EC2 IP resolution
#   AWS_SECRET_ACCESS_KEY     for dynamic EC2 IP resolution
#   AWS_REGION                ap-south-1
# =============================================================================

name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allows EC2 self-heal script to trigger redeploy after tunnel URL change

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend tests (no Ollama, no DB — all mocked)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get install -y tesseract-ocr libmagic1 --quiet

      - name: Install Python dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Download spaCy language model
        run: python -m spacy download en_core_web_sm

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short -q

  # ---------------------------------------------------------------------------
  # Job 2: Frontend tests (vitest only — build happens in deploy job after
  # the live tunnel URL is known)
  # ---------------------------------------------------------------------------
  frontend-tests:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/sentinel-ui/package.json

      - name: Install npm dependencies
        working-directory: frontend/sentinel-ui
        run: npm install --no-fund --no-audit

      - name: Run vitest
        working-directory: frontend/sentinel-ui
        run: npx vitest run

  # ---------------------------------------------------------------------------
  # Job 3: Deploy — only on push to main (not on PRs)
  #
  # ORDER MATTERS:
  #   Step A: Resolve EC2 IP
  #   Step B: Deploy backend to EC2 + restart services
  #   Step C: Extract live Cloudflare tunnel URL from EC2 logs
  #   Step D: Update VITE_API_BASE_URL in Vercel project env
  #   Step E: Build + deploy frontend to Vercel with correct URL baked in
  #
  # This guarantees the Vercel build always uses the URL the tunnel is
  # actually serving on right now, not a URL from a previous run.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to AWS + Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    # AWS credentials — used to resolve the current EC2 public IP dynamically
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}

    steps:
      - uses: actions/checkout@v4

      # ── Step A: Resolve current EC2 public IP ────────────────────────────────
      # Query AWS for the running sentinel-api instance rather than relying on
      # the EC2_HOST secret, which becomes stale when the instance restarts
      # and is assigned a new dynamic public IP.
      - name: Resolve current EC2 public IP
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=sentinel-api" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].PublicIpAddress" \
            --output text 2>/dev/null || true)
          # Fall back to the EC2_HOST secret if the AWS query fails
          IP="${IP:-${{ secrets.EC2_HOST }}}"
          echo "EC2_IP=${IP}" >> $GITHUB_ENV
          echo "Resolved EC2 IP: ${IP}"

      # ── Step B: Deploy backend to EC2 ────────────────────────────────────────
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/sentinel-key.pem
          chmod 600 /tmp/sentinel-key.pem

      - name: rsync backend to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --exclude=".env" \
            --exclude="*.db" \
            --exclude="*.sqlite" \
            --exclude="*.jsonl" \
            --exclude="__pycache__/" \
            --exclude=".pytest_cache/" \
            --exclude="data/regulatory_db.json" \
            backend/ \
            ${{ secrets.EC2_USER }}@$EC2_IP:/opt/sentinel/backend/

      - name: Seed regulatory_db.json on EC2 (only if absent)
        run: |
          ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@$EC2_IP \
            "[ -f /opt/sentinel/backend/data/regulatory_db.json ] && echo 'regulatory_db.json already exists — skipping seed' || echo 'File missing — will copy'"
          rsync -az \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --ignore-existing \
            backend/data/regulatory_db.json \
            ${{ secrets.EC2_USER }}@$EC2_IP:/opt/sentinel/backend/data/regulatory_db.json

      - name: rsync sample_docs to EC2
        run: |
          ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@$EC2_IP \
            "sudo mkdir -p /opt/sentinel/sample_docs && sudo chown ubuntu:ubuntu /opt/sentinel/sample_docs"
          rsync -az --delete \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            sample_docs/ \
            ${{ secrets.EC2_USER }}@$EC2_IP:/opt/sentinel/sample_docs/

      - name: Install Python dependencies on EC2
        run: |
          ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@$EC2_IP \
              "set -e
               echo '=== disk space before cleanup ==='
               df -h / | tail -1

               # Free space from pip cache and apt cache before installing
               pip3 cache purge 2>/dev/null || true
               sudo apt-get clean -y 2>/dev/null || true
               sudo journalctl --vacuum-size=100M 2>/dev/null || true
               echo '=== disk space after cleanup ==='
               df -h / | tail -1

               # Locate pip — ExecStart revealed venv at /opt/sentinel-venv/
               # Try all known paths; fall back to system pip3 only as last resort.
               # Ubuntu 22.04+ blocks system pip3 without --break-system-packages.
               if   [ -f /opt/sentinel-venv/bin/pip ];         then PIP=/opt/sentinel-venv/bin/pip
               elif [ -f /opt/sentinel/venv/bin/pip ];         then PIP=/opt/sentinel/venv/bin/pip
               elif [ -f /opt/sentinel/backend/venv/bin/pip ]; then PIP=/opt/sentinel/backend/venv/bin/pip
               else PIP=pip3; EXTRA_FLAGS='--break-system-packages'
               fi
               echo \"Using pip: \$PIP\"

               # Do NOT use --upgrade: sentence-transformers pulls in multi-GB torch/CUDA
               # packages on upgrade that exhaust the EC2 EBS volume.
               # Installing without --upgrade only adds genuinely missing packages.
               \$PIP install -q \${EXTRA_FLAGS:-} -r /opt/sentinel/backend/requirements.txt
               echo 'pip install complete'"

      - name: Ensure Ollama is running on EC2
        run: |
          ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@$EC2_IP \
              "sudo systemctl enable ollama 2>/dev/null || true
               sudo systemctl start ollama 2>/dev/null || true
               sleep 3
               if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
                 echo 'Ollama is running'
                 curl -s http://localhost:11434/api/tags | python3 -c 'import sys,json; d=json.load(sys.stdin); [print(\" model:\",m[\"name\"]) for m in d.get(\"models\",[])]'
               else
                 echo 'WARNING: Ollama not responding on :11434 — sentinel may fail LLM calls'
               fi"

      - name: Restart backend + Cloudflare tunnel
        run: |
          ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@$EC2_IP \
              "sudo systemctl restart sentinel && \
               echo 'Waiting for sentinel (sentence-transformers takes ~30s)...' && \
               for i in \$(seq 1 12); do sleep 5; curl -sf http://localhost:8000/api/history?limit=1 && echo 'API OK' && break || echo \"Attempt \$i/12...\"; done && \
               sudo systemctl is-active cloudflared-tunnel || sudo systemctl restart cloudflared-tunnel && \
               echo 'Cloudflare tunnel active'"

      # ── Step C: Extract live tunnel URL ──────────────────────────────────────
      # Must run AFTER the tunnel is up (Step B). The URL is ephemeral and
      # changes on each EC2 restart — we capture it here and inject it into
      # the Vercel build so the frontend always calls the live backend.
      - name: Extract Cloudflare tunnel URL
        run: |
          TUNNEL_URL=$(ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@$EC2_IP \
              "sudo journalctl -u cloudflared-tunnel --no-pager -n 200 | grep -o 'https://[a-z0-9-]*.trycloudflare.com' | tail -1")
          echo "Backend tunnel URL: ${TUNNEL_URL}"
          if [ -z "$TUNNEL_URL" ]; then
            echo "WARNING: Could not extract tunnel URL — falling back to VITE_API_BASE_URL secret"
            TUNNEL_URL="${{ secrets.VITE_API_BASE_URL }}"
          fi
          echo "TUNNEL_URL=${TUNNEL_URL}" >> $GITHUB_ENV

      # ── Step D: Update VITE_API_BASE_URL in Vercel project env ───────────────
      # Uses Vercel REST API directly (no vercel link needed).
      # The env var is updated BEFORE the build so vite bakes in the fresh URL.
      - name: Update VITE_API_BASE_URL in Vercel project (REST API)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Find and delete any existing VITE_API_BASE_URL env var
          ENV_ID=$(curl -sf "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            | jq -r '.envs[] | select(.key=="VITE_API_BASE_URL") | .id' 2>/dev/null | head -1 || true)
          if [ -n "$ENV_ID" ] && [ "$ENV_ID" != "null" ]; then
            curl -sf -X DELETE "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env/${ENV_ID}" \
              -H "Authorization: Bearer ${VERCEL_TOKEN}" > /dev/null
            echo "Deleted existing VITE_API_BASE_URL (id: $ENV_ID)"
          fi
          # Create the new env var pointing to the live tunnel URL
          curl -sf -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"key\":\"VITE_API_BASE_URL\",\"value\":\"${TUNNEL_URL}\",\"type\":\"plain\",\"target\":[\"production\"]}" \
            | jq -r '"Created VITE_API_BASE_URL = " + .value'

      # Also keep the GitHub secret in sync for future fallbacks
      # (non-fatal — GITHUB_TOKEN may lack secrets:write in some repo configs)
      - name: Sync VITE_API_BASE_URL GitHub secret
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$TUNNEL_URL" | gh secret set VITE_API_BASE_URL

      # ── Step E: Build + deploy frontend to Vercel ─────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install npm dependencies
        working-directory: frontend/sentinel-ui
        run: npm install --no-fund --no-audit

      - name: Deploy frontend to Vercel (production)
        working-directory: frontend/sentinel-ui
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ env.TUNNEL_URL }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      - name: Remove SSH key
        if: always()
        run: rm -f /tmp/sentinel-key.pem
