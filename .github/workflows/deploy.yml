# =============================================================================
# Project Sentinel — CI/CD Pipeline
#
# Triggers on every push to main:
#   1. Run backend tests (pytest) — all LLM calls mocked, no Ollama needed
#   2. Run frontend tests (vitest)
#   3. Build React app (vite build)
#   4. Deploy frontend to Vercel (HTTPS CDN)
#   5. rsync backend/ to EC2 + restart sentinel.service + cloudflared-tunnel
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EC2_HOST                  public IP of the EC2 instance
#   EC2_SSH_KEY               full contents of the .pem file
#   EC2_USER                  ubuntu
#   VERCEL_TOKEN              from vercel.com → Settings → Tokens
#   VERCEL_ORG_ID             from vercel.json or `vercel link`
#   VERCEL_PROJECT_ID         from vercel.json or `vercel link`
#   VITE_API_BASE_URL         Cloudflare tunnel URL (update if EC2 restarts)
# =============================================================================

name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # allows EC2 self-heal script to trigger redeploy after tunnel URL change

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend tests (no Ollama, no DB — all mocked)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get install -y tesseract-ocr libmagic1 --quiet

      - name: Install Python dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Download spaCy language model
        run: python -m spacy download en_core_web_sm

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short -q

  # ---------------------------------------------------------------------------
  # Job 2: Frontend tests + production build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Tests + Build (vitest + vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/sentinel-ui/package.json

      - name: Install npm dependencies
        working-directory: frontend/sentinel-ui
        run: npm install --no-fund --no-audit

      - name: Run vitest
        working-directory: frontend/sentinel-ui
        run: npx vitest run

      - name: Build production bundle
        working-directory: frontend/sentinel-ui
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npx vite build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/sentinel-ui/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Deploy — only on push to main (not on PRs)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to AWS + Vercel
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - uses: actions/checkout@v4

      # ── Frontend → Vercel ──────────────────────────────────────────────────
      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy frontend to Vercel (production)
        working-directory: frontend/sentinel-ui
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

      # ── Backend → EC2 via rsync + SSH ─────────────────────────────────────
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/sentinel-key.pem
          chmod 600 /tmp/sentinel-key.pem

      - name: rsync backend to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --exclude=".env" \
            --exclude="*.db" \
            --exclude="*.sqlite" \
            --exclude="*.jsonl" \
            --exclude="__pycache__/" \
            --exclude=".pytest_cache/" \
            --exclude="data/regulatory_db.json" \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/sentinel/backend/

      - name: Seed regulatory_db.json on EC2 (only if absent)
        run: |
          ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "[ -f /opt/sentinel/backend/data/regulatory_db.json ] && echo 'regulatory_db.json already exists — skipping seed' || echo 'File missing — will copy'"
          rsync -az \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --ignore-existing \
            backend/data/regulatory_db.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/sentinel/backend/data/regulatory_db.json

      - name: rsync sample_docs to EC2
        run: |
          ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/sentinel/sample_docs && sudo chown ubuntu:ubuntu /opt/sentinel/sample_docs"
          rsync -az --delete \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            sample_docs/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/sentinel/sample_docs/

      - name: Restart backend + Cloudflare tunnel
        run: |
          ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "sudo systemctl restart sentinel && \
               echo 'Waiting for sentinel (sentence-transformers takes ~30s)...' && \
               for i in \$(seq 1 12); do sleep 5; curl -sf http://localhost:8000/api/history?limit=1 && echo 'API OK' && break || echo \"Attempt \$i/12...\"; done && \
               sudo systemctl is-active cloudflared-tunnel || sudo systemctl restart cloudflared-tunnel && \
               echo 'Cloudflare tunnel active'"

      - name: Show Cloudflare tunnel URL
        run: |
          ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "sudo journalctl -u cloudflared-tunnel --no-pager -n 100 | grep -o 'https://[a-z0-9-]*.trycloudflare.com' | tail -1 | xargs -I{} echo 'Backend HTTPS URL: {}'"

      - name: Remove SSH key
        if: always()
        run: rm -f /tmp/sentinel-key.pem
