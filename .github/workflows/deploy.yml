# =============================================================================
# Project Sentinel — CI/CD Pipeline
#
# Triggers on every push to main:
#   1. Run backend tests (pytest) — all LLM calls mocked, no Ollama needed
#   2. Run frontend tests (vitest)
#   3. Build React app (vite build)
#   4. Sync dist/ to S3 (frontend)
#   5. rsync backend/ to EC2 + restart sentinel.service
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         IAM key with S3 PutObject + S3 ListBucket
#   AWS_SECRET_ACCESS_KEY     IAM secret
#   AWS_REGION                e.g. ap-south-1
#   S3_BUCKET                 e.g. sentinel-ui-sanjeev-2026
#   EC2_HOST                  public IP of the EC2 instance
#   EC2_SSH_KEY               full contents of the .pem file
#   EC2_USER                  ubuntu
#   VITE_API_BASE_URL         e.g. http://65.2.181.197:8000 (backend EC2 URL)
# =============================================================================

name: CI/CD — Test, Build, Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Backend tests (no Ollama, no DB — all mocked)
  # ---------------------------------------------------------------------------
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (Tesseract for OCR tests)
        run: sudo apt-get install -y tesseract-ocr libmagic1 --quiet

      - name: Install Python dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Download spaCy language model
        run: python -m spacy download en_core_web_sm

      - name: Run pytest
        working-directory: backend
        run: python -m pytest tests/ -v --tb=short -q

  # ---------------------------------------------------------------------------
  # Job 2: Frontend tests + production build
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Tests + Build (vitest + vite)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/sentinel-ui/package.json

      - name: Install npm dependencies
        working-directory: frontend/sentinel-ui
        run: npm install --no-fund --no-audit

      - name: Run vitest
        working-directory: frontend/sentinel-ui
        run: npx vitest run

      - name: Build production bundle
        working-directory: frontend/sentinel-ui
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npx vite build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/sentinel-ui/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Deploy — only on push to main (not on PRs)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Frontend → S3 ──────────────────────────────────────────────────────
      - name: Download frontend dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/sentinel-ui/dist/

      - name: Sync assets to S3 (long-TTL — hashed filenames)
        run: |
          aws s3 sync frontend/sentinel-ui/dist/assets/ \
            s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "public,max-age=31536000,immutable"

      - name: Sync HTML to S3 (short-TTL — always fresh)
        run: |
          aws s3 sync frontend/sentinel-ui/dist/ \
            s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --exclude "assets/*" \
            --cache-control "public,max-age=0,must-revalidate"

      # ── Backend → EC2 via rsync + SSH ─────────────────────────────────────
      - name: Write SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/sentinel-key.pem
          chmod 600 /tmp/sentinel-key.pem

      - name: rsync backend to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --exclude=".env" \
            --exclude="sentinel.db" \
            --exclude="*.jsonl" \
            --exclude="__pycache__/" \
            --exclude=".pytest_cache/" \
            --exclude="data/regulatory_db.json" \
            backend/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/sentinel/backend/

      - name: Seed regulatory_db.json on EC2 (only if absent)
        run: |
          ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "[ -f /opt/sentinel/backend/data/regulatory_db.json ] && echo 'regulatory_db.json already exists — skipping seed' || echo 'File missing — copying seed'"
          rsync -az \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            --ignore-existing \
            backend/data/regulatory_db.json \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/sentinel/backend/data/regulatory_db.json

      - name: rsync sample_docs to EC2
        run: |
          ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /opt/sentinel/sample_docs && sudo chown ubuntu:ubuntu /opt/sentinel/sample_docs"
          rsync -az --delete \
            -e "ssh -i /tmp/sentinel-key.pem -o StrictHostKeyChecking=no -o ConnectTimeout=20" \
            sample_docs/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/opt/sentinel/sample_docs/

      - name: Restart backend service
        run: |
          ssh -i /tmp/sentinel-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "sudo systemctl restart sentinel && echo 'Waiting for uvicorn (sentence-transformers takes ~30s to load)...' && for i in \$(seq 1 12); do sleep 5; curl -sf http://localhost:8000/api/health && echo 'Health OK' && exit 0; echo \"Attempt \$i/12...\"; done; echo 'Timed out waiting for health'; exit 1"

      - name: Remove SSH key
        if: always()
        run: rm -f /tmp/sentinel-key.pem
