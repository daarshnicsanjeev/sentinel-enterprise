# =============================================================================
# Project Sentinel — Infrastructure CI/CD (Terraform)
#
# WHEN IT RUNS
#   • Push to main   — only when files under infra/ changed → plan + apply
#   • Pull request   — only when files under infra/ changed → plan only (no apply)
#   • Manual trigger — workflow_dispatch lets you choose plan / apply / destroy
#
# WHY THIS IS SEPARATE FROM deploy.yml
#   deploy.yml  = code delivery  (rsync app code to existing EC2 on every push)
#   infra.yml   = infra changes  (terraform apply only when AWS resources change)
#
#   Running terraform apply on every code push is dangerous — it re-evaluates
#   the full resource graph and can destroy/recreate EC2 or S3 unexpectedly.
#
# REQUIRED GITHUB SECRETS
#   AWS_ACCESS_KEY_ID           IAM key — needs es:*, ec2:*, s3:*, cloudfront:* permissions
#   AWS_SECRET_ACCESS_KEY       IAM secret
#   AWS_REGION                  e.g. ap-south-1
#   TF_STATE_BUCKET             S3 bucket that holds terraform.tfstate
#                               (create once: see infra/main.tf bootstrap comment)
#   EC2_KEY_PAIR_NAME           Name of your EC2 key pair (not the .pem file)
#   EC2_HOST                    Public IP of the EC2 instance (shared with deploy.yml)
#   EC2_SSH_KEY                 Full contents of the .pem SSH key (shared with deploy.yml)
#   EC2_USER                    ubuntu (shared with deploy.yml)
#   FRONTEND_BUCKET_NAME        S3 bucket for the React frontend
#   REVIEW_MIN_EVIDENCE         Min 👎 per doc type before review agent acts (e.g. 1)
#   OPENSEARCH_MASTER_PASSWORD  Master password for the OpenSearch internal user.
#                               Min 8 chars, uppercase+lowercase+number+symbol.
#                               Example: Admin@1234!
#                               Used when enable_opensearch=true (see infra/terraform.tfvars).
#                               NOTE: After the first apply the password is stored in AWS
#                               OpenSearch — do not change it without updating the domain.
#
# OPTIONAL SECRETS
#   OLLAMA_BASE_URL             Leave empty to use local Ollama on EC2
#   OLLAMA_MODEL                Default: gemma3:4b
# =============================================================================

name: Infrastructure — Terraform Plan & Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"

  pull_request:
    branches: [main]
    paths:
      - "infra/**"

  # Manual trigger — lets you plan, apply, or destroy from the GitHub Actions UI
  # without pushing a commit
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: "1.9.0"
  WORKING_DIR: infra

jobs:
  # ---------------------------------------------------------------------------
  # Determine what action to take (plan / apply / destroy)
  # ---------------------------------------------------------------------------
  terraform:
    name: >-
      Terraform
      ${{
        github.event.inputs.action
        || (github.event_name == 'pull_request' && 'plan')
        || 'apply'
      }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    # Prevent concurrent terraform runs from corrupting state
    concurrency:
      group: terraform-${{ github.ref }}
      cancel-in-progress: false

    # AWS credentials — injected as env vars so Terraform + AWS CLI pick them up
    # automatically. Avoids the aws-actions/configure-aws-credentials download.
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ${{ secrets.AWS_REGION }}

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Terraform CLI — install directly from HashiCorp releases ──────────────
      # Avoids hashicorp/setup-terraform@v3 action which can fail on CDN issues.
      - name: Install Terraform ${{ env.TF_VERSION }}
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${{ env.TF_VERSION }}/terraform_${{ env.TF_VERSION }}_linux_amd64.zip"
          unzip -q "terraform_${{ env.TF_VERSION }}_linux_amd64.zip"
          sudo mv terraform /usr/local/bin/terraform
          terraform version

      # ── Init (S3 remote state) ───────────────────────────────────────────────
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=sentinel/terraform.tfstate" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -input=false

      # ── Validate ─────────────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Format check ─────────────────────────────────────────────────────────
      - name: Terraform Format check
        run: terraform fmt -check -recursive
        continue-on-error: true     # warn but don't fail CI on formatting

      # ── Plan (always — visible in PR checks and push logs) ───────────────────
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="frontend_bucket_name=${{ secrets.FRONTEND_BUCKET_NAME }}" \
            -var="key_pair_name=${{ secrets.EC2_KEY_PAIR_NAME }}" \
            -var="review_min_evidence=${{ secrets.REVIEW_MIN_EVIDENCE || '1' }}" \
            -var="ollama_base_url=${{ secrets.OLLAMA_BASE_URL || '' }}" \
            -var="enable_opensearch=true" \
            -var="opensearch_master_password=${{ secrets.OPENSEARCH_MASTER_PASSWORD || '' }}" \
            -input=false \
            -out=tfplan \
            -detailed-exitcode
        continue-on-error: true     # exit code 2 = changes pending (not an error)

      # ── Post plan summary as PR comment ──────────────────────────────────────
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const outcome = '${{ steps.plan.outcome }}';
            const body = [
              '## Terraform Plan',
              outcome === 'success' ? '✅ No changes — infrastructure is up to date.' : '⚠️ Changes detected — review before merging.',
              '',
              'Run `terraform plan` locally or check the Actions log for details.',
              '',
              '> This plan will be applied automatically when the PR is merged to `main`.',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      # ── Apply — only on push to main (not on PRs) or manual apply ────────────
      - name: Terraform Apply
        if: >-
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          github.event.inputs.action == 'apply'
        run: |
          terraform apply \
            -auto-approve \
            -input=false \
            tfplan

      # ── Print outputs so EC2 IP / CloudFront URL are visible in the log ──────
      - name: Show Terraform Outputs
        if: >-
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          github.event.inputs.action == 'apply'
        run: terraform output

      # ── Configure EC2 .env with OpenSearch endpoint (after apply) ────────────
      # Reads the opensearch_endpoint output and patches the backend .env on EC2
      # so sentinel.service connects to OpenSearch on next restart.
      # Only runs when enable_opensearch=true (output is not "not provisioned").
      - name: Configure OpenSearch on EC2
        if: >-
          (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
          github.event.inputs.action == 'apply'
        env:
          OPENSEARCH_PASSWORD: ${{ secrets.OPENSEARCH_MASTER_PASSWORD }}
        run: |
          ENDPOINT=$(terraform output -raw opensearch_endpoint 2>/dev/null || echo "")
          if [ -z "$ENDPOINT" ] || [ "$ENDPOINT" = "not provisioned" ]; then
            echo "OpenSearch not provisioned (enable_opensearch=false) — skipping EC2 .env update."
            exit 0
          fi

          echo "OpenSearch endpoint: $ENDPOINT"
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/infra-key.pem
          chmod 600 /tmp/infra-key.pem

          ssh -i /tmp/infra-key.pem \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "set -euo pipefail
               ENV_FILE=/opt/sentinel/backend/.env

               update_env() {
                 local KEY=\$1
                 local VAL=\$2
                 if sudo grep -q \"^\${KEY}=\" \"\$ENV_FILE\"; then
                   sudo sed -i \"s|^\${KEY}=.*|\${KEY}=\${VAL}|\" \"\$ENV_FILE\"
                   echo \"  Updated \${KEY}\"
                 else
                   echo \"\${KEY}=\${VAL}\" | sudo tee -a \"\$ENV_FILE\" > /dev/null
                   echo \"  Added \${KEY}\"
                 fi
               }

               echo '=== Configuring OpenSearch env vars ==='
               update_env VECTOR_STORE opensearch
               update_env OPENSEARCH_HOST $ENDPOINT
               update_env OPENSEARCH_PORT 443
               update_env OPENSEARCH_USER admin
               update_env OPENSEARCH_PASSWORD '$OPENSEARCH_PASSWORD'
               update_env OPENSEARCH_USE_SSL true

               echo 'Restarting sentinel.service...'
               sudo systemctl restart sentinel
               sleep 10
               curl -sf http://localhost:8000/api/health | python3 -m json.tool || echo 'Health check pending...'
               echo '=== OpenSearch configuration complete ==='"

          rm -f /tmp/infra-key.pem

      # ── Destroy — ONLY when manually requested via workflow_dispatch ──────────
      #    Never triggered automatically — requires a human to choose "destroy"
      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: |
          terraform destroy \
            -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="frontend_bucket_name=${{ secrets.FRONTEND_BUCKET_NAME }}" \
            -var="key_pair_name=${{ secrets.EC2_KEY_PAIR_NAME }}" \
            -var="review_min_evidence=${{ secrets.REVIEW_MIN_EVIDENCE || '1' }}" \
            -var="ollama_base_url=${{ secrets.OLLAMA_BASE_URL || '' }}" \
            -var="enable_opensearch=true" \
            -var="opensearch_master_password=${{ secrets.OPENSEARCH_MASTER_PASSWORD || '' }}" \
            -input=false
